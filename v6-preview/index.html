<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sisyphus V6">
  <meta name="theme-color" content="#76c5ee">
  <title>Myth of Sisyphus V6 Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080b0d; }
    body { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: #11171a; }
    #stage { position: fixed; inset: 0; height: 100vh; height: 100lvh; overflow: hidden; touch-action: none; background: #080b0d; }
    #world {
      position: absolute;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #hud { position: fixed; inset: 0; z-index: 4; pointer-events: none; padding-top: max(18px, calc(env(safe-area-inset-top) + 12px)); }
    #title { text-align: center; font-size: clamp(9px, 1.3vw, 14px); font-weight: 700; letter-spacing: 0.34em; text-indent: 0.34em; color: rgba(17,23,26,.82); text-shadow: 0 1px rgba(255,255,255,.22); }
    #distance { position: absolute; top: max(18px, calc(env(safe-area-inset-top) + 12px)); right: max(18px, calc(env(safe-area-inset-right) + 15px)); text-align: right; font-size: clamp(9px, 1.05vw, 12px); line-height: 1.35; letter-spacing: .14em; color: rgba(17,23,26,.78); }
    #distance small { display: block; font-size: .68em; letter-spacing: .11em; }
    #pause { position: fixed; z-index: 6; left: max(12px, calc(env(safe-area-inset-left) + 10px)); top: max(12px, calc(env(safe-area-inset-top) + 10px)); width: 42px; height: 42px; border: 1px solid rgba(255,255,255,.42); background: rgba(21,30,34,.58); color: #fff; font: 700 17px/1 ui-monospace, monospace; cursor: pointer; }
    #hint { position: fixed; z-index: 5; left: 50%; top: 43%; transform: translate(-50%,-50%); padding: 7px 11px; border: 1px solid rgba(255,255,255,.4); background: rgba(15,20,23,.58); color: rgba(255,255,255,.92); text-align: center; font-size: 11px; line-height: 1.35; letter-spacing: .06em; pointer-events: none; transition: opacity .3s linear; }
    #hint.hidden { opacity: 0; }
    #qa {
      display: none;
      position: fixed;
      z-index: 8;
      left: max(8px, env(safe-area-inset-left));
      bottom: max(8px, env(safe-area-inset-bottom));
      width: min(330px, calc(100vw - 16px));
      padding: 9px;
      background: rgba(11,16,18,.9);
      border: 1px solid rgba(255,255,255,.38);
      color: #fff;
      font-size: 10px;
    }
    body.qa #qa { display: block; }
    #qa strong { display: block; margin-bottom: 7px; letter-spacing: .16em; }
    #qa .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    #qa button { min-height: 30px; border: 1px solid rgba(255,255,255,.36); background: #1c2528; color: #fff; font: 10px ui-monospace, monospace; }
    #qa button.active { background: #f4f1df; color: #11171a; }
    #qa pre { margin-top: 7px; white-space: pre-wrap; line-height: 1.3; color: rgba(255,255,255,.76); }
    @media (max-width: 520px) and (orientation: portrait) {
      #title { font-size: 9px; letter-spacing: .26em; text-indent: .26em; }
      #distance { font-size: 9px; }
      #hint { top: 46%; }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Myth of Sisyphus pixel renderer preview">
    <canvas id="world"></canvas>
  </main>
  <div id="hud" aria-hidden="true">
    <div id="title">MYTH OF SISYPHUS</div>
    <div id="distance"><span id="metres">0000m</span><small id="best">BEST 0000M</small></div>
  </div>
  <button id="pause" type="button" aria-label="Pause">Ⅱ</button>
  <div id="hint">push the stone<br><span>tap anywhere</span></div>
  <section id="qa" aria-label="V6 renderer lab">
    <strong>V6 RENDERER LAB</strong>
    <div class="controls">
      <button type="button" data-terrain="curve" class="active">pixel curve</button>
      <button type="button" data-terrain="steps">slope tiles</button>
      <button type="button" id="cinematic" class="active">cinematic</button>
      <button type="button" id="grid">grid</button>
      <button type="button" id="auto" class="active">auto push</button>
      <button type="button" id="reset">reset</button>
    </div>
    <pre id="stats"></pre>
  </section>
  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const qa = params.get("qa") === "1";
    if (qa && params.get("clean") !== "1") document.body.classList.add("qa");

    const canvas = document.getElementById("world");
    const ctx = canvas.getContext("2d", { alpha: false });
    const stage = document.getElementById("stage");
    const metresEl = document.getElementById("metres");
    const bestEl = document.getElementById("best");
    const hint = document.getElementById("hint");
    const pauseButton = document.getElementById("pause");
    const statsEl = document.getElementById("stats");

    const P = {
      ink: ["#080b0d", "#11171a", "#1c2528"],
      sky: ["#76c5ee", "#5eb1e4", "#438fd0", "#3272b5"],
      far: ["#9fc8df", "#7daaca", "#608db8", "#4d73a0"],
      near: ["#476b91", "#345477", "#263f61", "#1b304e"],
      snow: ["#f4f1df", "#d9e4e8", "#b8cfdf", "#8fb1cc"],
      grass: ["#172d18", "#25451d", "#366323", "#4f8428", "#70a72e", "#9ac23b", "#c0d85a"],
      flowers: ["#f2eee0", "#e7a6bd", "#c95e89", "#e8554f", "#f1c84b"]
    };

    let W = 480;
    let H = 270;
    let scale = 3;
    let actorX = 202;
    let anchorY = 170;
    let terrainMode = params.get("terrain") === "steps" ? "steps" : "curve";
    let cinematic = params.get("strict") !== "1";
    let showGrid = false;
    let autoPush = qa && params.get("auto") !== "0";
    let paused = false;
    const GROUND_SCROLL = 7.2;
    const IMPULSE = 0.5;
    const DECAY = 1.85;
    const CLIMB = 22.1;
    const SLIP = 6.83;
    const ROLLBACK_ACCEL = 2.0;
    const ROLLBACK_CAP = 66.0;
    const IDLE_GRACE = 0.45;
    const BASE_SLOPE = 0;
    const MAX_SLOPE = 0.62;
    const SLOPE_GROW = 0.38 / 650;
    const EXTRA_STEEP_START = 450;
    const EXTRA_STEEP_RANGE = 1150;
    const SIM_STEP = 1 / 120;
    const MAX_SIM_STEPS = 8;
    let worldX = 0;
    let previousWorldX = 0;
    let viewWorldX = 0;
    let velocity = 0;
    let effort = 0;
    let energy = 1;
    let slideVel = 0;
    let idleGraceTimer = 0;
    let idleRollbackTimer = 0;
    let currentSlope = 0;
    let braceHeld = false;
    let bracePower = 0;
    let lastKey = "";
    let runPeak = 0;
    let bestScore = 0;
    let castShadowDirection = 1;
    let castShadowStrength = 0;
    let roll = 0;
    let pushPulse = 0;
    let walkPhase = 0;
    let actorActivity = 0;
    let actorBrace = 0;
    let side = 0;
    let elapsed = 0;
    let last = performance.now();
    let lastRenderAt = 0;
    let frameMs = [];
    let drawMs = [];
    let drawBreakdown = {};
    let lastMetresShown = -1;
    let lastBestShown = -1;
    let nextQaPublish = 0;
    let accumulator = 0;
    let simStepsLastFrame = 0;
    let droppedSimFrames = 0;
    let resizeKey = "";

    try {
      bestScore = Math.max(0, Number(localStorage.getItem("sisyphus6.best.endless")) || 0);
    } catch (error) {}
    if (qa && params.has("qaMeters")) {
      worldX = Math.max(0, Number(params.get("qaMeters")) || 0);
      previousWorldX = worldX;
      runPeak = worldX;
    }
    bestEl.textContent = `BEST ${String(Math.round(bestScore)).padStart(4, "0")}M`;

    const terrainCanvas = document.createElement("canvas");
    const terrainCtx = terrainCanvas.getContext("2d");
    const shadowCanvas = document.createElement("canvas");
    const shadowCtx = shadowCanvas.getContext("2d");
    const shadowStampCanvas = document.createElement("canvas");
    const shadowStampCtx = shadowStampCanvas.getContext("2d");
    const treeCanvas = document.createElement("canvas");
    const treeCtx = treeCanvas.getContext("2d");
    const foregroundTreeCanvas = document.createElement("canvas");
    const foregroundTreeCtx = foregroundTreeCanvas.getContext("2d");

    const tileAtlas = new Image();
    const boulderAtlas = new Image();
    const mountainPlate = new Image();
    const foregroundTree = new Image();
    const sun = new Image();
    tileAtlas.src = "assets/meadow-tiles-v1.png";
    boulderAtlas.src = "assets/boulder-frames-v5-approved.png";
    mountainPlate.src = "assets/mountain-plate-v6-candidate.png";
    foregroundTree.src = "../v5/assets/v5-pine-tree-1.png";
    sun.src = "../assets/sun-pixel.png";

    function chooseScale(width, height) {
      const portrait = height > width * 1.35;
      if (portrait) return 1;
      if (height < 520) return 2;
      return Math.max(2, Math.min(5, Math.floor(height / 270)));
    }

    function resize() {
      const rect = stage.getBoundingClientRect();
      const width = Math.max(1, Math.round(rect.width || innerWidth));
      const height = Math.max(1, Math.round(rect.height || innerHeight));
      const nextScale = chooseScale(width, height);
      const nextW = Math.ceil(width / nextScale);
      const nextH = Math.ceil(height / nextScale);
      const key = [width, height, nextScale, nextW, nextH].join(":");
      if (key === resizeKey) return;
      resizeKey = key;
      scale = nextScale;
      W = nextW;
      H = nextH;
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = `${W * scale}px`;
      canvas.style.height = `${H * scale}px`;
      canvas.style.left = `${Math.floor((width - W * scale) / 2)}px`;
      canvas.style.top = `${Math.floor((height - H * scale) / 2)}px`;
      ctx.imageSmoothingEnabled = false;
      terrainCanvas.width = shadowCanvas.width = W;
      terrainCanvas.height = shadowCanvas.height = H;
      terrainCtx.imageSmoothingEnabled = false;
      shadowCtx.imageSmoothingEnabled = false;
      actorX = Math.round(W * (height > width * 1.35 ? 0.46 : 0.42));
      anchorY = Math.round(H * (height > width * 1.35 ? 0.56 : 0.67));
      buildTree();
    }

    function hash(a, b = 0) {
      let n = Math.imul((a | 0) ^ 0x9e3779b9, 1597334677) ^ Math.imul((b | 0) + 31, 3812015801);
      n = Math.imul(n ^ (n >>> 15), 2246822519);
      return ((n ^ (n >>> 13)) >>> 0) / 4294967295;
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, value));
    }

    function smoother01(value) {
      const t = clamp01(value);
      return t * t * (3 - 2 * t);
    }

    function lerp(a, b, amount) {
      return a + (b - a) * amount;
    }

    function positiveMod(value, divisor) {
      return ((value % divisor) + divisor) % divisor;
    }

    function cameraWorld(metres) {
      return metres * GROUND_SCROLL;
    }

    function baseSlopeAt(metres) {
      const m = Math.max(0, metres);
      const early = Math.min(0.38, BASE_SLOPE + m * SLOPE_GROW);
      let extra = clamp01((m - EXTRA_STEEP_START) / EXTRA_STEEP_RANGE);
      extra = extra * extra * (3 - 2 * extra);
      return Math.min(MAX_SLOPE, early + extra * (MAX_SLOPE - 0.38));
    }

    function terrainRough(world) {
      const cell = 54;
      const index = Math.floor(world / cell);
      let local = (world - index * cell) / cell;
      local = local * local * (3 - 2 * local);
      const jitter = lerp(hash(index, 41) - .5, hash(index + 1, 41) - .5, local) * 1.35;
      return Math.sin(world * .020 + .8) * .95 + Math.sin(world * .048 + 2.3) * .42 + jitter;
    }

    function screenTerrainFloat(sx) {
      const world = viewWorldX + sx - actorX;
      let y = anchorY - currentSlope * (sx - actorX)
        + terrainRough(world) - terrainRough(viewWorldX);
      if (terrainMode === "steps") y = Math.round(y / 4) * 4;
      return y;
    }

    function screenTerrain(sx) {
      return Math.round(screenTerrainFloat(sx));
    }

    function scanPolygon(target, points, color) {
      let minY = Infinity;
      let maxY = -Infinity;
      for (const point of points) {
        minY = Math.min(minY, point[1]);
        maxY = Math.max(maxY, point[1]);
      }
      target.fillStyle = color;
      for (let y = Math.ceil(minY); y <= Math.floor(maxY); y += 1) {
        const intersections = [];
        for (let i = 0; i < points.length; i += 1) {
          const a = points[i];
          const b = points[(i + 1) % points.length];
          if ((a[1] <= y && b[1] > y) || (b[1] <= y && a[1] > y)) {
            intersections.push(a[0] + (y - a[1]) * (b[0] - a[0]) / (b[1] - a[1]));
          }
        }
        intersections.sort((a, b) => a - b);
        for (let i = 0; i + 1 < intersections.length; i += 2) {
          const x0 = Math.ceil(intersections[i]);
          const x1 = Math.floor(intersections[i + 1]);
          if (x1 >= x0) target.fillRect(x0, y, x1 - x0 + 1, 1);
        }
      }
    }

    function drawSky() {
      ctx.fillStyle = P.sky[0];
      ctx.fillRect(0, 0, W, H);
      const bands = [
        [Math.round(H * 0.24), P.sky[1]],
        [Math.round(H * 0.48), P.sky[2]]
      ];
      for (const [y, color] of bands) {
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = color;
        ctx.fillRect(0, y, W, Math.max(1, Math.round(H * 0.24)));
      }
      ctx.globalAlpha = 1;
    }

    function drawCloud(x, y, unit, color, alpha = 1) {
      x = Math.round(x);
      y = Math.round(y);
      unit = Math.max(1, Math.round(unit));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      const blocks = [[0,3,9,2],[1,2,7,2],[2,1,3,2],[5,2,3,2],[3,0,2,2],[8,4,4,1]];
      for (const b of blocks) ctx.fillRect(x + b[0] * unit, y + b[1] * unit, b[2] * unit, b[3] * unit);
      ctx.globalAlpha = 1;
    }

    function drawClouds(layer) {
      const speed = layer === 0 ? 1.8 : -2.6;
      const unit = layer === 0 ? 1 : 2;
      const span = W + 180;
      for (let i = 0; i < 5; i += 1) {
        const raw = i * span / 4 + elapsed * speed * (layer + 1) + (layer ? 80 : 0);
        const x = ((raw % span) + span) % span - 90;
        const y = Math.round(H * (layer === 0 ? 0.12 : 0.22) + hash(i, layer) * H * 0.18);
        drawCloud(x, y, unit, layer === 0 ? P.snow[1] : P.snow[0], layer === 0 ? 0.68 : 0.94);
      }
    }

    function mountain(centerX, baseY, width, height, color, snowColor, ridgeShift = 0) {
      centerX = Math.round(centerX);
      baseY = Math.round(baseY);
      width = Math.round(width);
      height = Math.round(height);
      const left = centerX - Math.floor(width / 2);
      const right = centerX + Math.ceil(width / 2);
      const peakX = centerX + ridgeShift;
      const points = [[left, baseY],[left + width * .18, baseY - height * .28],[left + width * .34, baseY - height * .42],[peakX, baseY - height],[right - width * .24, baseY - height * .36],[right, baseY]];
      scanPolygon(ctx, points, color);
      const snow = [[peakX, baseY - height],[peakX - width * .12, baseY - height * .66],[peakX - width * .02, baseY - height * .71],[peakX + width * .05, baseY - height * .56],[peakX + width * .12, baseY - height * .61],[peakX + width * .19, baseY - height * .44]];
      scanPolygon(ctx, snow, snowColor);
      scanPolygon(ctx, [[peakX,baseY-height],[peakX + width*.19,baseY-height*.44],[right-width*.24,baseY-height*.36],[right,baseY],[centerX+width*.08,baseY]], color === P.far[2] ? P.far[3] : P.near[3]);
    }

    function drawMountainLayer(layer) {
      const far = layer === 0;
      const spacing = far ? 122 : 178;
      const parallax = far ? 0.035 : 0.08;
      const offset = -Math.round(viewWorldX * parallax) % spacing;
      const base = Math.round(H * (far ? 0.60 : 0.72));
      for (let i = -2; i < Math.ceil(W / spacing) + 3; i += 1) {
        const seed = i + Math.floor(viewWorldX * parallax / spacing);
        const h = Math.round(H * (far ? 0.30 : 0.38) * (0.74 + hash(seed, layer) * 0.34));
        const w = Math.round(spacing * (1.18 + hash(seed, layer + 7) * .35));
        mountain(i * spacing + offset, base, w, h, far ? P.far[2] : P.near[1], far ? P.snow[2] : P.snow[3], Math.round((hash(seed, 91) - .5) * 18));
      }
    }

    function drawAuthoredMountains() {
      if (!mountainPlate.complete || !mountainPlate.naturalWidth) return false;
      const x = Math.round((W - 480) / 2);
      const y = Math.round(screenTerrain(actorX) - 240);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(mountainPlate, x, y);
      return true;
    }

    function drawSun() {
      const portrait = H > W * 1.35;
      const x = Math.round(W * (portrait ? .28 : .27));
      const y = Math.round(H * (portrait ? .13 : .16));
      const size = portrait ? 58 : 44;
      if (cinematic) {
        pixelEllipse(ctx, x, y, Math.round(size * .82), Math.round(size * .66), "rgba(255,241,177,.035)");
        pixelEllipse(ctx, x, y, Math.round(size * .67), Math.round(size * .54), "rgba(255,241,177,.045)");
        pixelEllipse(ctx, x, y, Math.round(size * .55), Math.round(size * .45), "rgba(255,241,177,.055)");
      }
      if (sun.complete && sun.naturalWidth) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(sun, x - size / 2, y - size / 2, size, size);
      }
    }

    function drawDistantTrees() {
      const spacing = 84;
      const first = Math.floor((viewWorldX - actorX) / spacing) - 2;
      for (let i = first; i < first + Math.ceil(W / spacing) + 5; i += 1) {
        const wx = i * spacing + Math.round(hash(i, 12) * 32);
        const sx = Math.round(actorX + (wx - viewWorldX));
        const sy = screenTerrain(sx) + 2;
        drawPine(ctx, sx, sy, 34 + Math.round(hash(i, 13) * 22), P.near[3], P.near[2]);
      }
    }

    function drawPine(target, baseX, baseY, height, dark, light) {
      const trunkW = Math.max(2, Math.round(height * .08));
      target.fillStyle = dark;
      target.fillRect(Math.round(baseX - trunkW / 2), Math.round(baseY - height * .35), trunkW, Math.round(height * .35));
      for (let tier = 0; tier < 5; tier += 1) {
        const top = Math.round(baseY - height + tier * height * .15);
        const half = Math.round(height * (.13 + tier * .055));
        scanPolygon(target, [[baseX,top],[baseX-half,top+Math.round(height*.28)],[baseX+half,top+Math.round(height*.28)]], dark);
        scanPolygon(target, [[baseX,top+2],[baseX-half+3,top+Math.round(height*.22)],[baseX-1,top+Math.round(height*.18)]], light);
      }
    }

    function drawTerrain() {
      const t = terrainCtx;
      t.clearRect(0, 0, W, H);
      t.imageSmoothingEnabled = false;
      if (tileAtlas.complete && tileAtlas.naturalWidth) {
        const tileSize = 16;
        const cameraLeft = viewWorldX - actorX;
        const cameraTop = cameraWorld(worldX) * currentSlope - anchorY;
        const startX = -Math.floor(positiveMod(cameraLeft, tileSize)) - tileSize;
        let minY = H;
        for (let x = 0; x <= W + tileSize; x += tileSize) minY = Math.min(minY, screenTerrain(x));
        minY = Math.max(0, minY - tileSize);
        const startY = Math.floor(minY / tileSize) * tileSize - Math.floor(positiveMod(cameraTop, tileSize));
        for (let y = startY; y < H + tileSize; y += tileSize) {
          for (let x = startX; x < W + tileSize; x += tileSize) {
            const worldTileX = Math.floor((cameraLeft + x) / tileSize);
            const worldTileY = Math.floor((cameraTop + y) / tileSize);
            const variant = Math.abs(worldTileX + worldTileY * 3) % 4;
            t.drawImage(tileAtlas, variant * 16, 16, 16, 16, x, y, 16, 16);
          }
        }
        for (let x = 0; x < W; x += 1) t.clearRect(x, 0, 1, Math.max(0, screenTerrain(x)));
        for (let x = -1; x < W + 1; x += 1) {
          const wx = Math.floor(cameraLeft + x);
          const variant = Math.abs(Math.floor(wx / 16)) % 4;
          const sy = screenTerrain(x);
          t.drawImage(tileAtlas, variant * 16 + ((wx % 16 + 16) % 16), 0, 1, 16, x, sy - 5, 1, 16);
        }
      } else {
        t.fillStyle = P.grass[3];
        for (let x = 0; x < W; x += 1) t.fillRect(x, screenTerrain(x), 1, H - screenTerrain(x));
      }
      ctx.drawImage(terrainCanvas, 0, 0);
    }

    function pixelEllipse(target, cx, cy, rx, ry, color) {
      target.fillStyle = color;
      for (let y = -ry; y <= ry; y += 1) {
        const span = Math.floor(rx * Math.sqrt(Math.max(0, 1 - (y * y) / (ry * ry))));
        target.fillRect(Math.round(cx - span), Math.round(cy + y), span * 2 + 1, 1);
      }
    }

    function buildForegroundTreeCache() {
      const tree = foregroundTree.complete && foregroundTree.naturalWidth ? foregroundTree : treeCanvas;
      const treeWidth = tree.naturalWidth || tree.width;
      const treeHeight = tree.naturalHeight || tree.height;
      if (!treeWidth || !treeHeight) return;
      const nearScale = 2;
      const renderWidth = Math.round(treeWidth * nearScale);
      const renderHeight = Math.round(treeHeight * nearScale);
      const pad = 5;
      foregroundTreeCanvas.width = renderWidth + pad * 2;
      foregroundTreeCanvas.height = renderHeight + pad * 2;
      foregroundTreeCtx.clearRect(0, 0, foregroundTreeCanvas.width, foregroundTreeCanvas.height);
      foregroundTreeCtx.imageSmoothingEnabled = false;
      foregroundTreeCtx.filter = `blur(${Math.max(.35, 1 / scale)}px)`;
      foregroundTreeCtx.drawImage(tree, pad, pad, renderWidth, renderHeight);
      foregroundTreeCtx.filter = "none";
    }

    function buildShadowStamp() {
      shadowStampCanvas.width = 64;
      shadowStampCanvas.height = 20;
      const pixels = shadowStampCtx.createImageData(64, 20);
      for (let y = 0; y < 20; y += 1) {
        for (let x = 0; x < 64; x += 1) {
          const nx = (x - 31.5) / 31.5;
          const ny = (y - 9.5) / 9.5;
          const distance = Math.sqrt(nx * nx + ny * ny);
          const falloff = Math.pow(Math.max(0, 1 - distance), 1.45);
          const index = (y * 64 + x) * 4;
          pixels.data[index] = 2;
          pixels.data[index + 1] = 12;
          pixels.data[index + 2] = 7;
          pixels.data[index + 3] = Math.round(falloff * 255);
        }
      }
      shadowStampCtx.putImageData(pixels, 0, 0);
    }

    function drawShadows(boulderX, groundY) {
      const s = shadowCtx;
      s.clearRect(0, 0, W, H);
      const portrait = H > W * 1.35;
      const sunX = W * (portrait ? .28 : .27);
      const sunY = H * (portrait ? .13 : .16);
      const targetDirection = Math.max(-1, Math.min(1, (boulderX - sunX) / Math.max(54, W * .14)));
      const targetStrength = 1;
      castShadowDirection += (targetDirection - castShadowDirection) * .08;
      castShadowStrength += (targetStrength - castShadowStrength) * .12;
      const direction = Math.abs(castShadowDirection) < .025 ? 0 : castShadowDirection;
      const lowLight = clamp01(sunY / Math.max(1, H * .34));
      const length = (62 + lowLight * 58) * castShadowStrength;

      function softEllipse(cx, cy, rx, ry, alpha) {
        const width = Math.max(2, Math.round(rx * 2.32));
        const height = Math.max(2, Math.round(ry * 2.7));
        s.globalAlpha = Math.max(0, Math.min(1, alpha));
        s.drawImage(shadowStampCanvas, Math.round(cx - width / 2), Math.round(cy - height / 2), width, height);
        s.globalAlpha = 1;
      }

      s.save();
      s.beginPath();
      s.moveTo(0, screenTerrain(0));
      for (let x = 4; x < W; x += 4) s.lineTo(x, screenTerrain(x));
      s.lineTo(W, screenTerrain(W));
      s.lineTo(W, H);
      s.lineTo(0, H);
      s.closePath();
      s.clip();

      const castReach = direction * length;
      softEllipse(
        boulderX + castReach * .34,
        screenTerrain(Math.round(boulderX + castReach * .34)) + 4,
        Math.max(18, Math.abs(castReach) * .46),
        7.2,
        .40 * castShadowStrength
      );
      softEllipse(
        boulderX + castReach * .20,
        screenTerrain(Math.round(boulderX + castReach * .20)) + 3,
        Math.max(15, Math.abs(castReach) * .30),
        6.1,
        .34 * castShadowStrength
      );

      for (let i = 8; i >= 0; i -= 1) {
        const u = i / 8;
        const x = boulderX + direction * length * u;
        const y = screenTerrain(Math.round(x)) + 3;
        softEllipse(x, y, 25 - u * 13, 6.5 - u * 3.2, .72 * Math.pow(1 - u, .72));
      }

      const manLength = length * .62;
      for (let i = 6; i >= 0; i -= 1) {
        const u = i / 6;
        const x = actorX - 8 + direction * manLength * u;
        const y = screenTerrain(Math.round(x)) + 3;
        softEllipse(x, y, 15 - u * 7, 4.2 - u * 1.8, .58 * Math.pow(1 - u, .8));
      }

      softEllipse(boulderX, groundY + 2, 25, 6, .82);
      softEllipse(actorX - 7, screenTerrain(actorX - 7) + 2, 17, 3.5, .68);
      s.restore();
      ctx.drawImage(shadowCanvas, 0, 0);
    }

    function linePixels(target, x0, y0, x1, y1, thickness, color) {
      x0 = Math.round(x0); y0 = Math.round(y0); x1 = Math.round(x1); y1 = Math.round(y1);
      const dx = Math.abs(x1 - x0);
      const sx = x0 < x1 ? 1 : -1;
      const dy = -Math.abs(y1 - y0);
      const sy = y0 < y1 ? 1 : -1;
      let err = dx + dy;
      target.fillStyle = color;
      while (true) {
        target.fillRect(x0 - Math.floor(thickness / 2), y0 - Math.floor(thickness / 2), thickness, thickness);
        if (x0 === x1 && y0 === y1) break;
        const e2 = 2 * err;
        if (e2 >= dy) { err += dy; x0 += sx; }
        if (e2 <= dx) { err += dx; y0 += sy; }
      }
    }

    function drawActor() {
      const ground = screenTerrain(actorX);
      const sample = 10;
      const theta = Math.atan2(screenTerrainFloat(actorX - sample) - screenTerrainFloat(actorX + sample), sample * 2);
      const cos = Math.cos(theta);
      const sin = Math.sin(theta);
      const s = 1.32;
      const brad = 32;
      const boulderLocalX = Math.round(19 * s) + brad;
      const boulderLocalY = -brad + Math.round(2 * s);

      function localPoint(x, y) {
        return {
          x: actorX + x * cos + y * sin,
          y: ground - x * sin + y * cos
        };
      }

      function localLimb(x0, y0, x1, y1, width, color) {
        const a = localPoint(x0, y0);
        const b = localPoint(x1, y1);
        linePixels(ctx, a.x, a.y, b.x, b.y, Math.max(1, Math.round(width)), color);
      }

      function localDisc(x, y, radius, color) {
        const point = localPoint(x, y);
        pixelEllipse(ctx, point.x, point.y, Math.max(1, Math.round(radius)), Math.max(1, Math.round(radius)), color);
      }

      const boulderPoint = localPoint(boulderLocalX, boulderLocalY);
      drawShadows(boulderPoint.x, screenTerrain(Math.round(boulderPoint.x)));
      const pushDrive = smoother01(clamp01(pushPulse * .78));
      if (boulderAtlas.complete && boulderAtlas.naturalWidth) {
        const frameCount = Math.max(1, Math.floor(boulderAtlas.naturalWidth / 64));
        const frame = Math.floor(positiveMod(roll - theta, Math.PI * 2) / (Math.PI * 2) * frameCount) % frameCount;
        const squash = 0;
        ctx.drawImage(boulderAtlas, frame * 64, 0, 64, 64,
          Math.round(boulderPoint.x - 32 - squash), Math.round(boulderPoint.y - 32 + squash),
          64 + squash * 2, 64 - squash * 2);
      } else {
        pixelEllipse(ctx, boulderPoint.x, boulderPoint.y, 30, 30, "#51585a");
      }

      // V5 actor geometry, retained as the animation source of truth.
      const brace = actorBrace;
      const bob = Math.sin(walkPhase * Math.PI * 2) * .8 * actorActivity * s * (1 - brace * .55);
      const hipX = -brace * 4 * s + pushDrive * 1.15 * s;
      const hipY = -14 * s + bob + brace * 2 * s + pushDrive * .75 * s;
      const shoulderX = hipX + (9 + brace * 4 + pushDrive * 1.85) * s;
      const shoulderY = hipY - (13 - brace * 1.5 - pushDrive * .5) * s + bob * .5;
      const limbWidth = Math.max(3, Math.round(4.3 * s));
      const torsoWidth = Math.max(4, Math.round(6 * s));

      if (brace > .08) {
        const backFootX = hipX - (19 + brace * 3 + pushDrive * 1.15) * s;
        const frontFootX = hipX - (7 + brace * 2 + pushDrive * .35) * s;
        const backKneeX = hipX - 12 * s;
        const backKneeY = hipY + 6 * s;
        const frontKneeX = hipX - s;
        const frontKneeY = hipY + 7 * s;
        localLimb(hipX, hipY, backKneeX, backKneeY, limbWidth, P.ink[0]);
        localLimb(backKneeX, backKneeY, backFootX, 0, limbWidth, P.ink[0]);
        localLimb(hipX, hipY, frontKneeX, frontKneeY, limbWidth, P.ink[0]);
        localLimb(frontKneeX, frontKneeY, frontFootX, 0, limbWidth, P.ink[0]);
        localLimb(backFootX - 6 * s, -s, backFootX + 4 * s, -s, 3 * s, P.ink[0]);
        localLimb(frontFootX - 5 * s, -s, frontFootX + 4 * s, -s, 3 * s, P.ink[0]);
      } else {
        const stepReach = 5 * s;
        const stepLift = 4 * s;
        const kneeBend = 3 * s;
        for (let leg = 0; leg < 2; leg += 1) {
          const phase = (walkPhase + leg * .5) * Math.PI * 2;
          const forward = Math.cos(phase);
          const lift = Math.max(0, Math.sin(phase)) * stepLift * actorActivity;
          const footX = hipX - 2 * s - forward * stepReach;
          const footY = -lift;
          const kneeX = (hipX + footX) / 2 + kneeBend;
          const kneeY = (hipY + footY) / 2 + s;
          localLimb(hipX, hipY, kneeX, kneeY, limbWidth, P.ink[0]);
          localLimb(kneeX, kneeY, footX, footY, limbWidth, P.ink[0]);
          localLimb(footX - 2 * s, footY - s, footX + 3 * s, footY - s, 2 * s, P.ink[0]);
        }
      }

      const idleBreath = actorActivity < .035 && effort < .055
        ? (Math.sin(elapsed * 2.05) * .5 + .5) : 0;
      localLimb(hipX, hipY, shoulderX, shoulderY, torsoWidth + idleBreath * .56 * s, P.ink[0]);
      const idleHead = 1 - smoother01(clamp01(actorActivity / .06));
      const neckX = shoulderX - .1 * s;
      const neckY = shoulderY - (1.35 + 1.25 * idleHead) * s;
      localLimb(shoulderX, shoulderY, neckX, neckY, 2 * s, P.ink[0]);
      const headRadius = Math.max(4, Math.round(5.8 * s));
      const headX = neckX - .5 * s;
      const headY = neckY - headRadius - .1 * s;
      localDisc(shoulderX + s, shoulderY, torsoWidth * .62, P.ink[0]);

      const boulderRatio = brad / (22 * s);
      const smallGrip = 1 - smoother01(clamp01((boulderRatio - 1) / .72));
      const handY = shoulderY + lerp(-s, 4.7 * s, smallGrip);
      const relativeY = Math.max(-brad + 3, Math.min(brad - 3, handY - boulderLocalY));
      const halfWidth = Math.sqrt(Math.max(0, brad * brad - relativeY * relativeY));
      const handX = boulderLocalX - halfWidth + s;
      const elbowX = shoulderX + (handX - shoulderX) * (.48 + pushDrive * .05);
      const elbowY = (shoulderY + handY) / 2 + (1.4 + pushDrive * .8) * s;
      const armWidth = Math.max(4, Math.round(5.4 * s));
      localLimb(shoulderX, shoulderY, elbowX, elbowY, armWidth, P.ink[0]);
      localLimb(elbowX, elbowY, handX, handY, armWidth, P.ink[0]);
      localDisc(handX, handY, 2 * s, P.ink[0]);
      localDisc(headX, headY, headRadius, "#000000");
    }

    function flower(wx, colorIndex, size = 1) {
      const sx = Math.round(actorX + wx - viewWorldX);
      if (sx < -10 || sx > W + 10) return;
      const sy = screenTerrain(sx);
      ctx.fillStyle = P.grass[1];
      ctx.fillRect(sx, sy - 6 * size, size, 6 * size);
      ctx.fillStyle = P.flowers[colorIndex % P.flowers.length];
      ctx.fillRect(sx - 2 * size, sy - 8 * size, 2 * size, 2 * size);
      ctx.fillRect(sx + size, sy - 8 * size, 2 * size, 2 * size);
      ctx.fillRect(sx, sy - 10 * size, 2 * size, 2 * size);
    }

    function drawProps() {
      const start = Math.floor((viewWorldX - actorX - 40) / 52) - 1;
      for (let i = start; i < start + Math.ceil(W / 52) + 4; i += 1) {
        const wx = i * 52 + Math.round(hash(i, 4) * 24);
        if (hash(i, 8) > .43) flower(wx, Math.floor(hash(i, 9) * P.flowers.length), hash(i, 10) > .86 ? 2 : 1);
      }
    }

    function buildTree() {
      treeCanvas.width = Math.max(260, Math.round(Math.min(W * .85, H * 1.12)));
      treeCanvas.height = Math.max(330, Math.round(H * 1.45));
      treeCtx.clearRect(0, 0, treeCanvas.width, treeCanvas.height);
      treeCtx.imageSmoothingEnabled = false;
      const baseX = Math.round(treeCanvas.width * .5);
      const baseY = treeCanvas.height - 2;
      const height = Math.round(treeCanvas.height * .92);
      treeCtx.fillStyle = "#3a2b21";
      treeCtx.fillRect(baseX - 14, baseY - Math.round(height * .47), 28, Math.round(height * .47));
      for (let tier = 0; tier < 8; tier += 1) {
        const top = Math.round(baseY - height + tier * height * .09);
        const half = Math.round(height * (.12 + tier * .038));
        scanPolygon(treeCtx, [[baseX,top],[baseX-half,top+Math.round(height*.23)],[baseX+half,top+Math.round(height*.23)]], tier % 2 ? "#16231a" : "#1d2c1d");
        scanPolygon(treeCtx, [[baseX-3,top+5],[baseX-half+8,top+Math.round(height*.18)],[baseX-3,top+Math.round(height*.15)]], "#354a25");
      }
      buildForegroundTreeCache();
    }

    function drawForegroundTree() {
      const tree = foregroundTree.complete && foregroundTree.naturalWidth ? foregroundTree : treeCanvas;
      const treeWidth = tree.naturalWidth || tree.width;
      const treeHeight = tree.naturalHeight || tree.height;
      const nearScale = 2;
      const renderWidth = treeWidth * nearScale;
      const renderHeight = treeHeight * nearScale;
      const baseY = H + Math.round(renderHeight * .55);
      const cycle = 760;
      const firstAnchor = 840;
      const first = Math.max(0, Math.floor((viewWorldX - actorX - renderWidth - firstAnchor) / cycle) - 1);
      for (let i = first; i < first + 4; i += 1) {
        const anchor = firstAnchor + i * cycle;
        const sx = Math.round(actorX + anchor - viewWorldX);
        if (sx < -renderWidth || sx > W + renderWidth) continue;
        ctx.save();
        const edgeDistance = Math.min(sx + renderWidth, W + renderWidth - sx);
        ctx.globalAlpha = smoother01(clamp01(edgeDistance / 90));
        ctx.imageSmoothingEnabled = false;
        if (cinematic && foregroundTreeCanvas.width) {
          const pad = (foregroundTreeCanvas.width - renderWidth) / 2;
          ctx.drawImage(foregroundTreeCanvas, Math.round(sx - foregroundTreeCanvas.width / 2), Math.round(baseY - renderHeight - pad));
        } else {
          ctx.drawImage(tree, Math.round(sx - renderWidth / 2), Math.round(baseY - renderHeight), renderWidth, renderHeight);
        }
        ctx.restore();
      }
    }

    function drawGrid() {
      if (!showGrid) return;
      ctx.globalAlpha = .18;
      ctx.fillStyle = "#fff";
      for (let x = 0; x < W; x += 16) ctx.fillRect(x, 0, 1, H);
      for (let y = 0; y < H; y += 16) ctx.fillRect(0, y, W, 1);
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = "source-over";
      ctx.imageSmoothingEnabled = false;
      const backgroundStart = qa ? performance.now() : 0;
      drawSky();
      drawSun();
      drawClouds(0);
      drawMountainLayer(0);
      drawClouds(1);
      if (!drawAuthoredMountains()) drawMountainLayer(1);
      drawDistantTrees();
      const terrainStart = qa ? performance.now() : 0;
      drawTerrain();
      drawProps();
      const actorStart = qa ? performance.now() : 0;
      drawActor();
      const foregroundStart = qa ? performance.now() : 0;
      drawForegroundTree();
      drawGrid();
      if (qa) {
        const done = performance.now();
        drawBreakdown = {
          background: Number((terrainStart - backgroundStart).toFixed(2)),
          terrain: Number((actorStart - terrainStart).toFixed(2)),
          actor: Number((foregroundStart - actorStart).toFixed(2)),
          foreground: Number((done - foregroundStart).toFixed(2))
        };
      }
    }

    function nextTapKey() {
      return lastKey === "L" ? "R" : "L";
    }

    function startBrace() {
      if (!paused) braceHeld = true;
    }

    function stopBrace() {
      braceHeld = false;
    }

    function push(key = nextTapKey()) {
      if (paused) return;
      side = 1 - side;
      if (key !== lastKey) {
        effort = Math.min(1, effort + IMPULSE);
        lastKey = key;
        pushPulse = Math.max(pushPulse, .22);
      } else {
        effort = Math.min(1, effort + .05);
      }
      hint.classList.add("hidden");
    }

    function update(dt) {
      if (paused) return;
      elapsed += dt;
      if (autoPush && Math.floor(elapsed * 7) !== Math.floor((elapsed - dt) * 7)) push(nextTapKey());

      effort *= Math.exp(-DECAY * dt);
      if (effort < .004) effort = 0;
      bracePower += ((braceHeld ? 1 : 0) - bracePower) * Math.min(1, dt * (braceHeld ? 7.5 : 8.5));
      if (braceHeld) energy = Math.max(0, energy - dt * .03);
      currentSlope = baseSlopeAt(worldX);

      const slip = SLIP * (.5 + currentSlope * 1.4);
      const pushPower = effort * CLIMB * (.96 + energy * .06);
      let net = pushPower - slip;
      if (effort > .08 && net < 0) {
        net = .08 + effort * .18;
        slideVel = 0;
      }
      if (effort > .08) {
        idleGraceTimer = IDLE_GRACE;
        idleRollbackTimer = 0;
      }

      if (worldX <= 0 && net < 0) {
        velocity = 0;
        slideVel = 0;
        idleRollbackTimer = 0;
      } else if (net >= 0) {
        idleRollbackTimer = Math.max(0, idleRollbackTimer - dt * 4);
        slideVel = effort > .08 ? 0 : Math.max(0, slideVel - (18 + pushPower) * dt);
        velocity = net;
      } else if (idleGraceTimer > 0 && worldX > 0) {
        idleGraceTimer = Math.max(0, idleGraceTimer - dt);
        idleRollbackTimer = 0;
        slideVel = 0;
        velocity = 0;
        if (idleGraceTimer < .3) bracePower = Math.max(bracePower, .42);
      } else {
        idleRollbackTimer = bracePower > .55
          ? Math.max(0, idleRollbackTimer - dt * 2.5)
          : Math.min(6, idleRollbackTimer + dt);
        const idleRamp = clamp01(idleRollbackTimer / 3);
        const recover = clamp01(bracePower * .52);
        const downhill = -net * (1 - recover * .46) * (1 + idleRamp * idleRamp * 9);
        const cap = Math.min(ROLLBACK_CAP * (1 + idleRamp * 9), 14 + currentSlope * 137 + idleRamp * 520);
        slideVel = Math.min(cap, slideVel + downhill * ROLLBACK_ACCEL * dt);
        velocity = -slideVel;
      }

      worldX = Math.max(0, worldX + velocity * dt);
      runPeak = Math.max(runPeak, worldX);
      if (worldX > bestScore) {
        bestScore = worldX;
        try { localStorage.setItem("sisyphus6.best.endless", String(Math.round(bestScore))); } catch (error) {}
      }

      const activityTarget = clamp01(effort * 1.6);
      actorActivity += (activityTarget - actorActivity) * Math.min(1, 8 * dt);
      const falling = worldX > .2 && velocity < -.6;
      const braceTarget = Math.max(
        falling ? clamp01(-velocity / 10) : 0,
        falling && braceHeld ? bracePower * .35 : 0
      );
      actorBrace += (braceTarget - actorBrace) * Math.min(1, (braceTarget > actorBrace ? 14 : 7) * dt);
      if (Math.abs(velocity) > .5) walkPhase += velocity * dt * .10;
      else {
        const nearestStep = Math.round(walkPhase * 2) / 2;
        walkPhase += (nearestStep - walkPhase) * Math.min(1, 5 * dt);
      }
      roll += velocity * dt * (velocity < 0 ? .52 : .13);
      const drain = effort * (.015 + currentSlope * .055 + .012);
      energy = clamp01(energy - drain * dt + (effort < .09 ? .18 : .035) * dt);
      pushPulse = Math.max(0, pushPulse - dt * 2.2);
    }

    function frame(now) {
      const raw = Math.min(50, Math.max(0, now - last));
      last = now;
      if (!paused) accumulator += raw / 1000;
      simStepsLastFrame = 0;
      while (accumulator >= SIM_STEP && simStepsLastFrame < MAX_SIM_STEPS) {
        previousWorldX = worldX;
        update(SIM_STEP);
        accumulator -= SIM_STEP;
        simStepsLastFrame += 1;
      }
      if (accumulator >= SIM_STEP) {
        accumulator = 0;
        droppedSimFrames += 1;
      }
      if (lastRenderAt && now - lastRenderAt < 15.5) {
        requestAnimationFrame(frame);
        return;
      }
      if (qa && lastRenderAt) {
        frameMs.push(now - lastRenderAt);
        if (frameMs.length > 240) frameMs.shift();
      }
      lastRenderAt = now;
      const renderAlpha = paused ? 1 : accumulator / SIM_STEP;
      viewWorldX = cameraWorld(lerp(previousWorldX, worldX, renderAlpha));
      const metresNow = Math.round(worldX);
      if (metresNow !== lastMetresShown) {
        lastMetresShown = metresNow;
        metresEl.textContent = `${String(metresNow).padStart(4, "0")}m`;
      }
      const bestNow = Math.round(bestScore);
      if (bestNow !== lastBestShown) {
        lastBestShown = bestNow;
        bestEl.textContent = `BEST ${String(bestNow).padStart(4, "0")}M`;
      }
      const drawStart = qa ? performance.now() : 0;
      draw();
      if (qa) {
        drawMs.push(performance.now() - drawStart);
        if (drawMs.length > 240) drawMs.shift();
        if (now >= nextQaPublish) {
          nextQaPublish = now + 250;
          const avg = frameMs.reduce((sum, value) => sum + value, 0) / Math.max(1, frameMs.length);
          const drawAvg = drawMs.reduce((sum, value) => sum + value, 0) / Math.max(1, drawMs.length);
          const state = {
            worldX: Number(worldX.toFixed(2)),
            velocity: Number(velocity.toFixed(2)),
            effort: Number(effort.toFixed(3)),
            energy: Number(energy.toFixed(3)),
            slope: Number(currentSlope.toFixed(3)),
            peak: Number(runPeak.toFixed(2)),
            best: Number(bestScore.toFixed(2)),
            terrainMode,
            cinematic,
            logical: `${W}x${H}`,
            displayScale: scale,
            animationSource: "v5",
            actorActivity: Number(actorActivity.toFixed(3)),
            actorBrace: Number(actorBrace.toFixed(3)),
            walkPhase: Number(walkPhase.toFixed(3)),
            cameraX: Number(viewWorldX.toFixed(2)),
            simSteps: simStepsLastFrame,
            droppedSimFrames,
            frameAvg: Number(avg.toFixed(2)),
            frameMax: Number(Math.max(...frameMs).toFixed(2)),
            drawAvg: Number(drawAvg.toFixed(2)),
            drawMax: Number(Math.max(...drawMs).toFixed(2)),
            drawBreakdown
          };
          document.body.dataset.v6State = JSON.stringify(state);
          if (statsEl) statsEl.textContent = `grid ${W}x${H} @ ${scale}x\nframe ${state.frameAvg}ms / draw ${state.drawAvg}ms\nscore ${state.worldX}m / peak ${state.peak}m\neffort ${state.effort} / speed ${state.velocity}\ncamera ${state.cameraX}px / sim ${state.simSteps}`;
        }
      }
      requestAnimationFrame(frame);
    }

    function shouldIgnorePressTarget(target) {
      return !!(target && target.closest && target.closest("#pause, #qa"));
    }

    stage.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      push(nextTapKey());
      startBrace();
    }, { passive: false });
    stage.addEventListener("pointerup", stopBrace, { passive: true });
    stage.addEventListener("pointercancel", stopBrace, { passive: true });
    document.addEventListener("pointerup", stopBrace, { passive: true });
    document.addEventListener("pointercancel", stopBrace, { passive: true });
    document.addEventListener("pointerdown", (event) => {
      if (shouldIgnorePressTarget(event.target)) return;
      push(nextTapKey());
      startBrace();
    }, { passive: true });
    if (!window.PointerEvent) {
      stage.addEventListener("mousedown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        push(nextTapKey());
        startBrace();
      }, { passive: false });
      stage.addEventListener("touchstart", (event) => {
        event.preventDefault();
        event.stopPropagation();
        push(nextTapKey());
        startBrace();
      }, { passive: false });
      document.addEventListener("mouseup", stopBrace, { passive: true });
      document.addEventListener("touchend", stopBrace, { passive: true });
      document.addEventListener("touchcancel", stopBrace, { passive: true });
    }
    addEventListener("keydown", (event) => {
      if (event.repeat) return;
      if (["ArrowLeft", "a", "A"].includes(event.key)) {
        event.preventDefault();
        push("L");
      } else if (["ArrowRight", "d", "D"].includes(event.key)) {
        event.preventDefault();
        push("R");
      } else if (event.key === " " || event.key === "Spacebar" || event.code === "Space") {
        event.preventDefault();
        push(nextTapKey());
        startBrace();
      }
    }, { passive: false });
    addEventListener("keyup", (event) => {
      if (event.key === " " || event.key === "Spacebar" || event.code === "Space") stopBrace();
    }, { passive: true });
    addEventListener("blur", stopBrace, { passive: true });
    pauseButton.addEventListener("click", (event) => {
      event.stopPropagation();
      paused = !paused;
      pauseButton.textContent = paused ? "▶" : "Ⅱ";
      pauseButton.setAttribute("aria-label", paused ? "Resume" : "Pause");
    });
    document.querySelectorAll("[data-terrain]").forEach((button) => button.addEventListener("click", (event) => {
      event.stopPropagation();
      terrainMode = button.dataset.terrain;
      document.querySelectorAll("[data-terrain]").forEach((item) => item.classList.toggle("active", item === button));
    }));
    document.getElementById("cinematic").addEventListener("click", (event) => {
      event.stopPropagation();
      cinematic = !cinematic;
      event.currentTarget.classList.toggle("active", cinematic);
    });
    document.getElementById("grid").addEventListener("click", (event) => {
      event.stopPropagation();
      showGrid = !showGrid;
      event.currentTarget.classList.toggle("active", showGrid);
    });
    document.getElementById("auto").addEventListener("click", (event) => {
      event.stopPropagation();
      autoPush = !autoPush;
      event.currentTarget.classList.toggle("active", autoPush);
    });
    document.getElementById("reset").addEventListener("click", (event) => {
      event.stopPropagation();
      worldX = 0; previousWorldX = 0; viewWorldX = 0; velocity = 0; effort = 0; energy = 1; slideVel = 0; idleGraceTimer = 0; idleRollbackTimer = 0; currentSlope = 0; braceHeld = false; bracePower = 0; lastKey = ""; runPeak = 0; roll = 0; walkPhase = 0; actorActivity = 0; actorBrace = 0; elapsed = 0; accumulator = 0; lastMetresShown = -1;
    });
    addEventListener("resize", resize);
    addEventListener("orientationchange", () => setTimeout(resize, 180));
    foregroundTree.addEventListener("load", buildForegroundTreeCache);
    if (window.ResizeObserver) new ResizeObserver(resize).observe(stage);
    resize();
    buildShadowStamp();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
